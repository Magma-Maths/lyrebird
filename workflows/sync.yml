# Install in the PRIVATE repo at .github/workflows/sync.yml
#
# Daily reconciliation of public issues with their private mirrors.
# Catches any events missed due to runner failures or transient errors.

name: Sync public issues

on:
  schedule:
    - cron: '0 6 * * *'    # daily at 06:00 UTC
  workflow_dispatch:         # manual trigger
    inputs:
      since_hours:
        description: 'Hours to look back (e.g., "25"). Use "all" for a full historical sync.'
        required: false
        type: string
        default: '25'

concurrency:
  group: lyrebird-sync
  cancel-in-progress: true

env:
  PUBLIC_REPO: ${{ vars.PUBLIC_REPO }}
  PRIVATE_REPO: ${{ vars.PRIVATE_REPO }}
  BOT_LOGIN: ${{ vars.BOT_LOGIN }}
  # Resolution labels: maps resolution key → private label, public
  # close note, and GitHub state_reason.  Customise as needed.
  RESOLUTION_LABELS: >-
    {
      "completed":        {"label": "resolution:completed",        "note": "This has been fixed and will be available in the next update. Thanks for the report. If you still see this after updating, please comment here with details.", "state_reason": "completed"},
      "not-planned":      {"label": "resolution:not-planned",      "note": "Closing as not planned at this time. Thanks for taking the time to report it.",                               "state_reason": "not_planned"},
      "cannot-reproduce": {"label": "resolution:cannot-reproduce", "note": "We could not reproduce this with the information available. If you can share steps/logs, we can reopen.",      "state_reason": "not_planned"},
      "custom":           {"label": "resolution:custom",           "note": "",                                                                                                            "state_reason": null}
    }

jobs:
  sync:
    if: github.repository == vars.PRIVATE_REPO
    runs-on: ubuntu-slim
    steps:
      - name: Checkout lyrebird
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.LYREBIRD_REPO }}
          path: lyrebird

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install lyrebird
        run: pip install ./lyrebird

      - name: Generate App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.LYREBIRD_APP_ID }}
          private-key: ${{ secrets.LYREBIRD_APP_PRIVATE_KEY }}
          repositories: ${{ vars.PUBLIC_REPO_NAME }},${{ vars.PRIVATE_REPO_NAME }}
          owner: ${{ github.repository_owner }}

      - name: Run sync
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ inputs.since_hours }}" = "all" ]; then
              python -m lyrebird sync --all
            else
              python -m lyrebird sync --since "${{ inputs.since_hours }}"
            fi
          else
            python -m lyrebird sync
          fi

# Install in the PUBLIC repo at .github/workflows/public-dispatch.yml
#
# This workflow forwards issue and comment events to the private repo
# via workflow_dispatch.  No business logic runs here.

name: Dispatch public events to private repo

on:
  issues:
    types: [opened, edited, labeled, unlabeled, closed, reopened]
  issue_comment:
    types: [created, edited, deleted]

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Generate App token for private repo
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.LYREBIRD_APP_ID }}
          private-key: ${{ secrets.LYREBIRD_APP_PRIVATE_KEY }}
          repositories: ${{ vars.PRIVATE_REPO_NAME }}
          owner: ${{ github.repository_owner }}

      - name: Dispatch to private repo
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: '${{ github.repository_owner }}',
              repo: '${{ vars.PRIVATE_REPO_NAME }}',
              workflow_id: 'handle-public-event.yml',
              ref: 'main',
              inputs: {
                event_name: '${{ github.event_name }}',
                action: '${{ github.event.action }}',
                event: JSON.stringify(context.payload)
              }
            });

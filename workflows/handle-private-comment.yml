# Install in the PRIVATE repo at .github/workflows/handle-private-comment.yml
#
# Handles slash commands in private issue comments (/public, /public-close).

name: Handle private comment events

on:
  issue_comment:
    types: [created]

concurrency:
  group: private-issue-${{ github.event.issue.node_id }}
  cancel-in-progress: false

jobs:
  handle:
    # Only run if the comment looks like a slash command
    if: startsWith(github.event.comment.body, '/public')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout lyrebird
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.LYREBIRD_REPO }}
          path: lyrebird

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install lyrebird
        run: pip install ./lyrebird

      - name: Generate App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.LYREBIRD_APP_ID }}
          private-key: ${{ secrets.LYREBIRD_APP_PRIVATE_KEY }}
          repositories: ${{ vars.PUBLIC_REPO_NAME }},${{ vars.PRIVATE_REPO_NAME }}
          owner: ${{ github.repository_owner }}

      - name: Run handler
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          PUBLIC_REPO: ${{ vars.PUBLIC_REPO }}
          PRIVATE_REPO: ${{ vars.PRIVATE_REPO }}
          BOT_LOGIN: ${{ vars.BOT_LOGIN }}
          EVENT_NAME: ${{ github.event_name }}
          EVENT_ACTION: ${{ github.event.action }}
          EVENT_SOURCE: private
          EVENT_PAYLOAD: ${{ toJson(github.event) }}
          # Resolution labels: maps resolution key → private label, public
          # close note, and GitHub state_reason.  Customise as needed.
          RESOLUTION_LABELS: >-
            {
              "completed":        {"label": "external:completed",        "note": "This has been fixed and will be available in the next update. Thanks for the report. If you still see this after updating, please comment here with details.", "state_reason": "completed"},
              "not-planned":      {"label": "external:not-planned",      "note": "Closing as not planned at this time. Thanks for taking the time to report it.",                               "state_reason": "not_planned"},
              "cannot-reproduce": {"label": "external:cannot-reproduce", "note": "We could not reproduce this with the information available. If you can share steps/logs, we can reopen.",      "state_reason": "not_planned"}
            }
        run: python -m lyrebird

# Install in the PRIVATE repo at .github/workflows/handle-public-event.yml
#
# Receives forwarded public events via repository_dispatch and runs
# the appropriate lyrebird handler.

name: Handle public event

on:
  repository_dispatch:
    types: [public_event]

concurrency:
  group: public-issue-${{ github.event.client_payload.event.issue.node_id }}
  cancel-in-progress: false

jobs:
  handle:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout lyrebird
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.LYREBIRD_REPO }}
          path: lyrebird

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install lyrebird
        run: pip install ./lyrebird

      - name: Generate App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.LYREBIRD_APP_ID }}
          private-key: ${{ secrets.LYREBIRD_APP_PRIVATE_KEY }}
          repositories: ${{ vars.PUBLIC_REPO_NAME }},${{ vars.PRIVATE_REPO_NAME }}
          owner: ${{ github.repository_owner }}

      - name: Run handler
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          PUBLIC_REPO: ${{ vars.PUBLIC_REPO }}
          PRIVATE_REPO: ${{ vars.PRIVATE_REPO }}
          BOT_LOGIN: ${{ vars.BOT_LOGIN }}
          EVENT_NAME: repository_dispatch
          EVENT_ACTION: public_event
          EVENT_SOURCE: public
          EVENT_PAYLOAD: ${{ toJson(github.event) }}
          # Resolution labels: maps resolution key → private label, public
          # close note, and GitHub state_reason.  Customise as needed.
          RESOLUTION_LABELS: >-
            {
              "fixed":            {"label": "external:fixed",            "note": "Fixed on main. Thanks for the report. If you still see this after updating, please comment here with details.", "state_reason": "completed"},
              "wontfix":          {"label": "external:wontfix",          "note": "Closing as not planned at this time. Thanks for taking the time to report it.",                               "state_reason": "not_planned"},
              "duplicate":        {"label": "external:duplicate",        "note": "Closing as a duplicate. Please follow the linked issue for updates.",                                         "state_reason": "completed"},
              "cannot-reproduce": {"label": "external:cannot-reproduce", "note": "We could not reproduce this with the information available. If you can share steps/logs, we can reopen.",      "state_reason": "completed"}
            }
        run: python -m lyrebird

# Install in the PRIVATE repo at .github/workflows/handle-public-event.yml
#
# Receives forwarded public events via workflow_dispatch and runs
# the appropriate lyrebird handler.

name: Handle public event

on:
  workflow_dispatch:
    inputs:
      event_name:
        description: 'The original event name (e.g., issues, issue_comment)'
        required: true
        type: string
      action:
        description: 'The original event action (e.g., opened, created)'
        required: true
        type: string
      issue_node_id:
        description: 'The node ID of the issue (for concurrency grouping)'
        required: true
        type: string
      event:
        description: 'The full event payload from the public repo'
        required: true
        type: string

concurrency:
  group: public-event-${{ inputs.issue_node_id }}
  cancel-in-progress: false

env:
  PUBLIC_REPO: ${{ vars.PUBLIC_REPO }}
  PRIVATE_REPO: ${{ vars.PRIVATE_REPO }}
  BOT_LOGIN: ${{ vars.BOT_LOGIN }}
  EVENT_NAME: ${{ inputs.event_name }}
  EVENT_ACTION: ${{ inputs.action }}
  EVENT_SOURCE: public
  EVENT_PAYLOAD: ${{ inputs.event }}
  # Resolution labels: maps resolution key → private label, public
  # close note, and GitHub state_reason.  Customise as needed.
  RESOLUTION_LABELS: >-
    {
      "completed":        {"label": "resolution:completed",        "note": "This has been fixed and will be available in the next update. Thanks for the report. If you still see this after updating, please comment here with details.", "state_reason": "completed"},
      "not-planned":      {"label": "resolution:not-planned",      "note": "Closing as not planned at this time. Thanks for taking the time to report it.",                               "state_reason": "not_planned"},
      "cannot-reproduce": {"label": "resolution:cannot-reproduce", "note": "We could not reproduce this with the information available. If you can share steps/logs, we can reopen.",      "state_reason": "not_planned"},
      "custom":           {"label": "resolution:custom",           "note": "",                                                                                                            "state_reason": null}
    }

jobs:
  handle:
    if: github.repository == vars.PRIVATE_REPO
    runs-on: ubuntu-slim
    steps:
      - name: Checkout lyrebird
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.LYREBIRD_REPO }}
          path: lyrebird

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install lyrebird
        run: pip install ./lyrebird

      - name: Generate App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.LYREBIRD_APP_ID }}
          private-key: ${{ secrets.LYREBIRD_APP_PRIVATE_KEY }}
          repositories: ${{ vars.PUBLIC_REPO_NAME }},${{ vars.PRIVATE_REPO_NAME }}
          owner: ${{ github.repository_owner }}

      - name: Run handler
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: python -m lyrebird
